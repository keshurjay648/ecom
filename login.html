<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Login | Flikart</title>

    <link rel="shortcut icon" href="img/fav_icon.jpg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-white">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="index.html">
          <img src="img/logo.jpg" width="180" />
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <form class="d-flex mx-auto search-box">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search products"
            />

            <button class="btn btn-primary">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="login.html">Login</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="register.html">Register</a>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                Category
              </a>

              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Fashion</a></li>
                <li><a class="dropdown-item" href="#">Grocery</a></li>

                <li><hr class="dropdown-divider" /></li>

                <li><a class="dropdown-item" href="#">Electronics</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- LOGIN SECTION -->

    <section class="login-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-5">
            <div class="login-card">
              <h2 class="text-center mb-4">Login</h2>

              <form>
                <div class="mb-3">
                  <label class="form-label">Email address</label>

                  <input
                    type="email"
                    class="form-control"
                    placeholder="Enter email"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>

                  <input
                    type="password"
                    class="form-control"
                    placeholder="Enter password"
                  />
                </div>

                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" />

                  <label class="form-check-label">Remember me</label>
                </div>

                <button class="btn btn-primary w-100">Login</button>

                <div class="text-center mt-3">
                  <a href="register.html">Create account</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->

    <footer>
      <div class="container">
        <div class="row gy-4">
          <div class="col-lg-3 col-md-6">
            <h5>Address</h5>

            Borivali (West)<br />
            Mumbai - 400099
          </div>

          <div class="col-lg-3 col-md-6">
            <h5>Links</h5>

            <a href="index.html">Home</a><br />
            <a href="login.html">Login</a><br />
            <a href="about.html">About</a><br />
            <a href="contact.html">Contact</a>
          </div>

          <div class="col-lg-3 col-md-6">
            <h5>Socials</h5>

            <a href="#"><i class="bi bi-facebook"></i> Facebook</a><br />
            <a href="#"><i class="bi bi-twitter"></i> Twitter</a><br />
            <a href="#"><i class="bi bi-instagram"></i> Instagram</a>
          </div>

          <div class="col-lg-3 col-md-6">
            <h5>Services</h5>

            Products<br />
            Delivery<br />
            Warehouse
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
